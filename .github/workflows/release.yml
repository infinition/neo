name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: build windows binaries
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: install rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-release-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}

      - name: build workspace (release)
        run: cargo build --release --workspace

      - name: stage release artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          foreach ($e in @("target/release/neo.exe", "target/release/neo-studio.exe")) {
            if (Test-Path $e) { Copy-Item $e dist/ } else { Write-Warning "missing: $e" }
          }
          Get-ChildItem dist

      - name: zip release bundle
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ([string]::IsNullOrEmpty($tag)) { $tag = "dev" }
          Compress-Archive -Path dist/* -DestinationPath "neo-$tag-windows-x86_64.zip"

      - name: upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: neo-windows-x86_64
          path: |
            dist/*.exe
            neo-*-windows-x86_64.zip

      - name: publish github release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.exe
            neo-*-windows-x86_64.zip
          generate_release_notes: true
